      network:
        type: string
      requestNo:
        type: string
      toAddress:
        type: string
      tokenAddress:
        type: string
      walletNo:
        type: string
    required:
    - amount
    - network
    - requestNo
    - toAddress
    - walletNo
    type: object
  models.WalletCreateRequest:
    type: object
  models.WalletInfoQueryRequest:
    properties:
      walletNo:
        type: string
    required:
    - walletNo
    type: object
