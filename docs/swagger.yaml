basePath: /api/v1
definitions:
  models.Response:
    properties:
      code:
        type: string
      data: {}
      message:
        type: string
    type: object
  models.TransactionHistoryQueryRequest:
    properties:
      cursor:
        type: integer
      direction:
        type: string
      endTime:
        type: integer
      pageSize:
        type: integer
      startTime:
        type: integer
      walletNo:
        type: string
    required:
    - pageSize
    - walletNo
    type: object
  models.TransactionQueryRequest:
    properties:
      transactionNo:
        type: string
    required:
    - transactionNo
    type: object
  models.TransferOutQueryRequest:
    properties:
      walletNo:
