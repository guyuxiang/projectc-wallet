basePath: /api/v1
definitions:
  models.ConnectorChainEvent:
    properties:
      data:
        additionalProperties: true
        type: object
      type:
        type: string
    type: object
  models.ConnectorChainTx:
    properties:
      amount:
        type: string
      blockNumber:
        type: integer
      code:
        type: string
      fee:
        type: string
      from:
        type: string
      networkCode:
        type: string
      status:
        type: string
      timestamp:
        type: integer
      to:
        type: string
    type: object
  models.ConnectorTxCallbackRequest:
    properties:
      tx:
        $ref: '#/definitions/models.ConnectorChainTx'
      txEvents:
        items:
          $ref: '#/definitions/models.ConnectorChainEvent'
        type: array
    type: object
  models.ConnectorTxRollbackRequest:
    properties:
      networkCode:
        type: string
      txCode:
        type: string
    type: object
  models.Response:
    properties:
      code:
        type: string
      data: {}
      message:
        type: string
    type: object
  models.SignatureKeyUpsertRequest:
    properties:
      privateKey:
        type: string
      publicKey:
        type: string
      publickeyId:
        type: string
    required:
    - privateKey
    - publicKey
    - publickeyId
    type: object
  models.TransactionHistoryQueryRequest:
    properties:
      cursor:
        type: integer
      direction:
        type: string
      endTime:
        type: integer
      pageSize:
        type: integer
      startTime:
        type: integer
      walletNo:
        type: string
    required:
    - pageSize
    - walletNo
    type: object
  models.TransactionQueryRequest:
    properties:
      transactionNo:
        type: string
    required:
    - transactionNo
    type: object
  models.TransferOutQueryRequest:
    properties:
      network:
        type: string
      walletNo:
        type: string
    required:
    - walletNo
    type: object
  models.TransferOutRequest:
    properties:
      amount:
        type: string
      network:
        type: string
      requestNo:
        type: string
      toAddress:
        type: string
      tokenSymbol:
        type: string
      walletNo:
        type: string
    required:
    - amount
    - network
    - requestNo
    - toAddress
    - walletNo
    type: object
  models.WalletCreateRequest:
    type: object
  models.WalletInfoQueryRequest:
    properties:
      network:
        type: string
      walletNo:
        type: string
    required:
    - walletNo
    type: object
info:
  contact:
    email: gu_yuxiang@qq.com
    name: guyuxiang
    url: https://guyuxiang.github.io
  description: This is a projectc-custodial-wallet.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  title: Swagger projectc-custodial-wallet
  version: 0.1.0
paths:
  /admin/signature/key/upsert:
    post:
      consumes:
      - application/json
      description: Persist or update a signature key pair by publickeyId.
      parameters:
      - description: Signature key upsert request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.SignatureKeyUpsertRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/models.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.Response'
      summary: UpsertSignatureKey
      tags:
      - SignatureKey
  /inner/wallet/callback/rollback:
    post:
      consumes:
      - application/json
      description: Receive rollback callback pushed by connector and mark related
        wallet transactions as failed.
      parameters:
      - description: Connector transaction rollback callback request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.ConnectorTxRollbackRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/models.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.Response'
      summary: ReceiveRollbackCallback
      tags:
      - Wallet
  /inner/wallet/callback/tx:
    post:
      consumes:
      - application/json
      description: Receive transaction callback pushed by connector and update wallet
        transactions.
      parameters:
      - description: Connector transaction callback request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.ConnectorTxCallbackRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/models.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.Response'
      summary: ReceiveTxCallback
      tags:
      - Wallet
  /inner/wallet/create:
    post:
      consumes:
      - application/json
      description: Create a master walletNo and automatically create addresses for
        all configured networks.
      parameters:
      - description: Create wallet request, no parameters required
        in: body
        name: request
        schema:
          $ref: '#/definitions/models.WalletCreateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/models.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.Response'
      summary: CreateWallet
      tags:
      - Wallet
  /wallet/info/query:
    post:
      consumes:
      - application/json
      description: Query token balances of a wallet. When network is specified, return
        balances under that network; when network is empty, aggregate balances across
        all supported networks under the master walletNo.
      parameters:
      - description: Wallet info query request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.WalletInfoQueryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/models.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.Response'
      summary: QueryWalletInfo
      tags:
      - Wallet
  /wallet/transaction/history/query:
    post:
      consumes:
      - application/json
      description: Query wallet transaction history by cursor and time range.
      parameters:
      - description: Transaction history query request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.TransactionHistoryQueryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/models.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.Response'
      summary: QueryHistory
      tags:
      - Wallet
  /wallet/transaction/query:
    post:
      consumes:
      - application/json
      description: Query a single transaction by transactionNo.
      parameters:
      - description: Transaction query request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.TransactionQueryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/models.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.Response'
      summary: QueryTransaction
      tags:
      - Wallet
  /wallet/transfer/out:
    post:
      consumes:
      - application/json
      description: Submit a wallet transfer-out request by tokenSymbol for the specified
        network.
      parameters:
      - description: Transfer out request, tokenSymbol is used instead of tokenAddress
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.TransferOutRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/models.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.Response'
      summary: TransferOut
      tags:
      - Wallet
  /wallet/transfer/out/query:
    post:
      consumes:
      - application/json
      description: Query transferable assets of a wallet under a specific network,
        including native token and configured network tokens.
      parameters:
      - description: Transfer out capability query request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.TransferOutQueryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/models.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.Response'
      summary: QueryTransferOutAssets
      tags:
      - Wallet
swagger: "2.0"
